<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garagem - Criar Grupo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
        }
    </style>
</head>
<body class="bg-gray-50">
    
    <!-- Loader Global -->
    <div id="globalLoader" class="hidden fixed inset-0 bg-black bg-opacity-70 z-50 flex items-center justify-center">
        <div class="text-center">
            <div class="spinner w-16 h-16 mx-auto mb-4"></div>
            <p class="text-white text-lg" data-loader-label>Criando grupo...</p>
        </div>
    </div>

    <!-- Modal de Notificação -->
    <div id="notificationModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-[60] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full p-6">
            <div class="flex items-center mb-4">
                <div id="modalIcon" class="mr-3"></div>
                <h3 id="modalTitle" class="text-xl font-bold text-gray-800"></h3>
            </div>
            <p id="modalMessage" class="text-gray-600 mb-6"></p>
            <button type="button" data-modal-close="notificationModal" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-semibold py-3 rounded-lg transition duration-200">
                Entendi
            </button>
        </div>
    </div>

    <!-- Navbar -->
    <nav class="bg-white shadow-md">
        <div class="container mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <a href="dashboard.html" class="text-gray-600 hover:text-purple-600" aria-label="Voltar para o dashboard">
                        <i class="fas fa-arrow-left text-xl"></i>
                    </a>
                    <div class="bg-purple-600 w-10 h-10 rounded-lg flex items-center justify-center">
                        <i class="fas fa-warehouse text-white text-lg"></i>
                    </div>
                    <h1 class="text-2xl font-bold text-gray-800">Criar Grupo/Comunidade</h1>
                </div>
            </div>
        </div>
    </nav>

    <!-- Conteúdo -->
    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <div class="bg-white rounded-xl shadow-md p-8">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">Informações do Grupo</h2>
            
            <form id="groupForm" class="space-y-6">
                <!-- Tipo -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-3">
                        <i class="fas fa-shapes mr-2 text-purple-600"></i>
                        Tipo
                    </label>
                    <div class="grid grid-cols-2 gap-4">
                        <label class="relative flex items-center p-4 border-2 border-gray-300 rounded-lg cursor-pointer hover:border-purple-500 transition">
                            <input type="radio" name="groupType" value="group" checked class="mr-3">
                            <div>
                                <p class="font-medium text-gray-800">Grupo</p>
                                <p class="text-sm text-gray-500">Grupo padrão WhatsApp</p>
                            </div>
                        </label>
                        <label class="relative flex items-center p-4 border-2 border-gray-300 rounded-lg cursor-pointer hover:border-purple-500 transition">
                            <input type="radio" name="groupType" value="community" class="mr-3">
                            <div>
                                <p class="font-medium text-gray-800">Comunidade</p>
                                <p class="text-sm text-gray-500">Comunidade WhatsApp</p>
                            </div>
                        </label>
                    </div>
                </div>

                <!-- Nome do Grupo -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        <i class="fas fa-users mr-2 text-purple-600"></i>
                        Nome do Grupo *
                    </label>
                    <input type="text" id="groupName" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                        placeholder="Ex: VIP Black Friday">
                </div>

                <!-- Descrição -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        <i class="fas fa-align-left mr-2 text-purple-600"></i>
                        Descrição
                    </label>
                    <textarea id="groupDescription" rows="3"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                        placeholder="Descrição do grupo"></textarea>
                </div>

                <!-- Projeto Associado -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        <i class="fas fa-project-diagram mr-2 text-purple-600"></i>
                        Projeto Associado *
                    </label>
                    <select id="projectSelect" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                        <option value="">Selecione um projeto</option>
                    </select>
                </div>

                <!-- Upload Thumbnail -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        <i class="fas fa-image mr-2 text-purple-600"></i>
                        Foto do Grupo
                    </label>
                    <div class="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center hover:border-purple-500 transition cursor-pointer">
                        <input type="file" id="groupThumb" accept="image/*" class="hidden">
                        <label id="uploadArea" for="groupThumb" class="block cursor-pointer">
                            <i class="fas fa-cloud-upload-alt text-4xl text-gray-400 mb-2"></i>
                            <p class="text-gray-600">Clique para fazer upload ou arraste uma imagem</p>
                            <p class="text-sm text-gray-500 mt-1">PNG, JPG até 50MB</p>
                        </label>
                        <div id="imagePreview" class="hidden">
                            <img id="previewImg" class="max-h-48 mx-auto rounded-lg">
                            <button type="button" class="mt-3 text-red-600 hover:text-red-700 text-sm" data-action="group.removeThumbnail">
                                <i class="fas fa-trash mr-1"></i>Remover imagem
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Mensagem de Grupo Cheio -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        <i class="fas fa-exclamation-circle mr-2 text-purple-600"></i>
                        Mensagem para Grupo Cheio
                    </label>
                    <textarea id="fullGroupMessage" rows="3"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                        placeholder="Mensagem automática quando o grupo atingir o limite de membros"></textarea>
                    <label class="flex items-center mt-2">
                        <input type="checkbox" id="disableFullMessage" class="mr-2 w-4 h-4 text-purple-600">
                        <span class="text-sm text-gray-600">Não enviar mensagem quando o grupo estiver cheio</span>
                    </label>
                </div>

                <!-- Configurações -->
                <div class="bg-gray-50 rounded-lg p-4">
                    <h3 class="font-medium text-gray-800 mb-3">Configurações</h3>
                    <div class="space-y-2">
                        <label class="flex items-center">
                            <input type="checkbox" id="autoClose" class="mr-2 w-4 h-4 text-purple-600">
                            <span class="text-sm text-gray-700">Encerrar grupo automaticamente quando cheio</span>
                        </label>
                    </div>
                </div>

                <!-- Botões -->
                <div class="flex gap-4 pt-6 border-t">
                    <a href="dashboard.html" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold py-3 rounded-lg transition text-center flex items-center justify-center">
                        Cancelar
                    </a>
                    <button type="submit" 
                        class="flex-1 bg-purple-600 hover:bg-purple-700 text-white font-semibold py-3 rounded-lg transition flex items-center justify-center">
                        <i class="fas fa-save mr-2"></i>
                        Criar Grupo
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/group-form.js"></script>
</body>
</html>
