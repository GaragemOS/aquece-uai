<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garagem - Criar Projeto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
        }
    </style>
</head>
<body class="bg-gray-50">
    
    <!-- Loader Global -->
    <div id="globalLoader" class="hidden fixed inset-0 bg-black bg-opacity-70 z-50 flex items-center justify-center">
        <div class="text-center">
            <div class="spinner w-16 h-16 mx-auto mb-4"></div>
            <p class="text-white text-lg" data-loader-label>Salvando projeto...</p>
        </div>
    </div>

    <!-- Modal de Notificação -->
    <div id="notificationModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-[60] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full p-6">
            <div class="flex items-center mb-4">
                <div id="modalIcon" class="mr-3"></div>
                <h3 id="modalTitle" class="text-xl font-bold text-gray-800"></h3>
            </div>
            <p id="modalMessage" class="text-gray-600 mb-6"></p>
            <button onclick="closeModal()" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-semibold py-3 rounded-lg transition duration-200">
                Entendi
            </button>
        </div>
    </div>

    <!-- Navbar -->
    <nav class="bg-white shadow-md">
        <div class="container mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <a href="dashboard.html" class="text-gray-600 hover:text-purple-600" aria-label="Voltar para o dashboard">
                        <i class="fas fa-arrow-left text-xl"></i>
                    </a>
                    <div class="bg-purple-600 w-10 h-10 rounded-lg flex items-center justify-center">
                        <i class="fas fa-warehouse text-white text-lg"></i>
                    </div>
                    <h1 class="text-2xl font-bold text-gray-800">Novo Projeto</h1>
                </div>
            </div>
        </div>
    </nav>

    <!-- Conteúdo -->
    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <div class="bg-white rounded-xl shadow-md p-8">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">Informações do Projeto</h2>
            
            <form id="projectForm" class="space-y-6">
                <!-- Nome do Projeto -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        <i class="fas fa-tag mr-2 text-purple-600"></i>
                        Nome do Projeto *
                    </label>
                    <input type="text" id="projectName" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                        placeholder="Ex: Projeto Black Friday 2024">
                </div>

                <!-- Descrição -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        <i class="fas fa-align-left mr-2 text-purple-600"></i>
                        Descrição
                    </label>
                    <textarea id="projectDescription" rows="4"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                        placeholder="Descreva os objetivos e detalhes do projeto"></textarea>
                </div>

                <!-- Upload Thumbnail -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        <i class="fas fa-image mr-2 text-purple-600"></i>
                        Thumbnail do Projeto
                    </label>
                    <div class="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center hover:border-purple-500 transition cursor-pointer">
                        <input type="file" id="projectThumb" accept="image/*" class="hidden" onchange="previewImage(event)">
                        <div id="uploadArea" onclick="document.getElementById('projectThumb').click()">
                            <i class="fas fa-cloud-upload-alt text-4xl text-gray-400 mb-2"></i>
                            <p class="text-gray-600">Clique para fazer upload ou arraste uma imagem</p>
                            <p class="text-sm text-gray-500 mt-1">PNG, JPG até 50MB</p>
                        </div>
                        <div id="imagePreview" class="hidden">
                            <img id="previewImg" class="max-h-48 mx-auto rounded-lg">
                            <button type="button" onclick="removeImage()" class="mt-3 text-red-600 hover:text-red-700 text-sm">
                                <i class="fas fa-trash mr-1"></i>Remover imagem
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Administradores -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        <i class="fas fa-user-shield mr-2 text-purple-600"></i>
                        Telefones dos Administradores
                    </label>
                    <div id="adminsList" class="space-y-2 mb-2">
                        <div class="flex gap-2">
                            <input type="tel" placeholder="5511999999999"
                                class="flex-1 px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent admin-phone">
                        </div>
                    </div>
                    <button type="button" class="text-purple-600 hover:text-purple-700 text-sm font-medium" data-action="admin.add">
                        <i class="fas fa-plus mr-1"></i>Adicionar outro administrador
                    </button>
                </div>

                <!-- Tokens do Projeto -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        <i class="fas fa-key mr-2 text-purple-600"></i>
                        Tokens de Acesso (opcional)
                    </label>
                    <input type="text" id="projectTokens"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                        placeholder="Tokens separados por vírgula">
                    <p class="text-sm text-gray-500 mt-1">Se deixar em branco, será gerado automaticamente</p>
                </div>

                <!-- Botões -->
                <div class="flex gap-4 pt-6 border-t">
                    <a href="dashboard.html" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold py-3 rounded-lg transition text-center flex items-center justify-center">
                        Cancelar
                    </a>
                    <button type="submit" 
                        class="flex-1 bg-purple-600 hover:bg-purple-700 text-white font-semibold py-3 rounded-lg transition flex items-center justify-center">
                        <i class="fas fa-save mr-2"></i>
                        Criar Projeto
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/project-form.js"></script>
</body>
</html>
